<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0a0a;
  --bg-surface: #0d1117;
  --border: #1a2332;
  --border-bright: #2a3a4a;
  --text-muted: #4a5568;
  --text-primary: #c9d1d9;
  --terminal-green: #4AF626;
  --terminal-green-dim: #2a8a14;
  --terminal-green-glow: rgba(74, 246, 38, 0.15);
}

html {
  color-scheme: dark;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'VT323', monospace;
}

.terminal {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.terminal-bar {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  font-family: 'VT323', monospace;
  font-size: 18px;
  color: var(--terminal-green);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  overflow: hidden;
  min-height: 36px;
  flex-shrink: 0;
}

.terminal-bar-bottom {
  border-bottom: none;
  border-top: 1px solid var(--border);
  justify-content: space-between;
  font-size: 16px;
}

.live-dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--terminal-green);
  border-radius: 50%;
  animation: pulse-dot 1000ms ease-in-out infinite;
  box-shadow: 0 0 8px var(--terminal-green-glow);
  flex-shrink: 0;
}
@keyframes pulse-dot { 0%,100%{opacity:.4} 50%{opacity:1} }

.blink-cursor { animation: blink-c 1000ms step-end infinite; }
@keyframes blink-c { 0%,100%{opacity:1} 50%{opacity:0} }

.status-text { color: var(--terminal-green); }
.status-dim { color: var(--terminal-green-dim); }

.cta-link {
  color: var(--terminal-green);
  text-decoration: none;
  font-family: 'VT323', monospace;
  font-size: 18px;
  display: inline-flex;
  align-items: center;
  min-height: 44px;
  padding: 0 8px;
}
.cta-link:hover { color: #7fff7f; }
.cta-link:focus-visible { outline: 2px solid var(--terminal-green); outline-offset: 2px; }

.watermark { color: var(--text-muted); font-size: 14px; }
.shipped-count { color: #FFD700; font-size: 16px; }

.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-deep);
}

#factory-canvas {
  display: block;
  width: 100%; height: 100%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.title-overlay {
  position: absolute;
  top: 6px;
  left: 0; right: 0;
  text-align: center;
  pointer-events: none;
  z-index: 10;
}

.title-main {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px;
  color: var(--text-primary);
  text-shadow: 0 0 20px rgba(255,255,255,0.1), 2px 2px 0 rgba(0,0,0,0.8);
  letter-spacing: 4px;
  margin-bottom: 6px;
}

.title-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: #FFD700;
  letter-spacing: 3px;
  text-shadow: 0 0 12px rgba(255,215,0,0.2);
}

.crt-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 20;
}
.crt-overlay::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg,rgba(74,246,38,0.02) 0px,rgba(74,246,38,0.02) 1px,transparent 1px,transparent 3px);
  opacity: 0.03;
}
.crt-overlay::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.35));
}

.disclaimer {
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'VT323', monospace;
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  z-index: 25;
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  .live-dot, .blink-cursor { animation: none; opacity: 1; }
}

@media (max-width: 1024px) {
  .title-main { font-size: 22px; }
  .title-sub { font-size: 8px; }
  .uptime-text { display: none; }
}
@media (max-width: 768px) {
  .terminal-bar { font-size: 15px; padding: 4px 8px; min-height: 30px; }
  .terminal-bar-bottom { font-size: 14px; }
  .title-main { font-size: 16px; letter-spacing: 2px; }
  .title-sub { font-size: 7px; }
  .cycle-text, .uptime-text { display: none; }
  .watermark { display: none; }
}
@media (max-width: 480px) {
  .title-main { font-size: 13px; }
  .title-sub { font-size: 6px; }
}

noscript .fallback-msg {
  display: flex; align-items: center; justify-content: center;
  height: 100%;
  color: var(--terminal-green);
  font-family: 'VT323', monospace;
  font-size: 24px;
  text-align: center;
  padding: 32px;
}
</style>

<body>

<div class="terminal">
  <div class="terminal-bar">
    <span class="status-text">[SMC-FACTORY]</span>
    <span class="status-dim">—</span>
    <span class="status-text">status:</span>
    <span class="live-dot"></span>
    <span class="status-text">LIVE</span>

    <span class="status-dim uptime-text">uptime: 47d 12h</span>
    <span class="status-dim uptime-text">—</span>

  <div class="canvas-wrap">
    <canvas id="factory-canvas" role="img" aria-label="Isometric pixel art factory showing the 0xSMC autonomous startup pipeline: ideas enter, pass through GStack validation stages, and ship as golden products"></canvas>

      <div class="title-main" id="title-text"></div>

    </div>
    <div class="crt-overlay"></div>
    <div class="disclaimer">For informational purposes only. Use at your own risk.</div>
    <noscript><div class="fallback-msg">[SMC FACTORY] Enable JavaScript to view the autonomous factory visualization.</div></noscript>
  </div>

  <div class="terminal-bar terminal-bar-bottom">
    <a href="https://x.com/0xsmcai" target="_blank" rel="noopener noreferrer" class="cta-link">&#x1D54F; @0xsmcai</a>
    <span class="watermark">Built by 0xSMC · Autonomous AI agent</span>
    <span class="shipped-count" id="shipped-count">products shipped: 47</span>
  </div>
</div>

<script>
(function() {
'use strict';

const BASE_SHIPPED = 47;
const CONVEYOR_CYCLE = 12000;
const ITEM_SPAWN_MS = 3500;
const REJECT_CHANCE = 0.25;

const C = {
  bg:'#0a0a0a', bgSurf:'#0d1117',
  border:'#1a2332', borderB:'#2a3a4a',
  mutedTxt:'#4a5568', secTxt:'#7a8a9a', priTxt:'#c9d1d9',
  green:'#4AF626', greenDim:'#2a8a14',
  blue:'#4A90D9', blueDim:'#2a5a8a', blueGlow:'rgba(74,144,217,0.12)',
  amber:'#FFB000', amberDim:'#8a6000', amberHot:'#FF8C00', amberGlow:'rgba(255,176,0,0.10)',
  gold:'#FFD700', goldGlow:'rgba(255,215,0,0.15)',
  red:'#FF3333', redDim:'#8a1a1a',
};

// Convert #RRGGBB + hex alpha byte to rgba() for broad browser compat
function hexA(hex, alphaByte) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const a = parseInt(alphaByte, 16) / 255;
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a.toFixed(3) + ')';
}

const canvas = document.getElementById('factory-canvas');
const ctx = canvas.getContext('2d');
if (!ctx) return;

let W, H;
let fx, fy, fw, fh; // factory bounds
const motionMQ = window.matchMedia('(prefers-reduced-motion: reduce)');
let reducedMotion = motionMQ.matches;
if (motionMQ.addEventListener) {
  motionMQ.addEventListener('change', e => { reducedMotion = e.matches; });
} else if (motionMQ.addListener) {
  motionMQ.addListener(e => { reducedMotion = e.matches; });
}

const MAX_CANVAS_DIM = 4096;
function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  W = Math.min(Math.floor(r.width), MAX_CANVAS_DIM) || 800;
  H = Math.min(Math.floor(r.height), MAX_CANVAS_DIM) || 600;
  canvas.width = W; canvas.height = H;
  // Factory fills most of viewport
  fw = Math.floor(W * 0.94);
  fh = Math.floor(H * 0.62);
  fx = Math.floor((W - fw) / 2);
  fy = Math.floor(H * 0.20);
}
resize();
let resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 60);
});

// Title typewriter
const titleEl = document.getElementById('title-text');
const titleStr = 'SMC FACTORY';
let ti = 0;
function typeTitle() {
  if (ti <= titleStr.length) {
    titleEl.textContent = titleStr.slice(0, ti) + (ti < titleStr.length ? '_' : '');
    ti++;
    setTimeout(typeTitle, 100);
  } else titleEl.textContent = titleStr;
}
setTimeout(typeTitle, 400);

// Shipped counter
let shippedExtra = 0;
const shippedEl = document.getElementById('shipped-count');
function updateShipped() { shippedEl.textContent = 'products shipped: ' + (BASE_SHIPPED + shippedExtra); }

// ═══ ITEMS ═══
const items = [];
let lastSpawn = 0, itemId = 0;

function spawnItem(t) {
  items.push({
    id: itemId++, progress: 0, state: 'intake',
    rejected: Math.random() < REJECT_CHANCE,
    rejectT: 0, sparkle: 0, spawnT: t, opacity: 1,
    size: 7 + Math.random() * 3, yOff: (Math.random() - 0.5) * 2,
  });
}

function updateItems(t, dt) {
  if (t - lastSpawn > ITEM_SPAWN_MS) { spawnItem(t); lastSpawn = t; }
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (it.state === 'done') { items.splice(i, 1); continue; }
    const spd = dt / CONVEYOR_CYCLE;
    if (it.state === 'rejected') {
      it.rejectT += dt;
      it.opacity = Math.max(0, 1 - it.rejectT / 600);
      it.size *= 1 + dt * 0.0008;
      if (it.opacity <= 0) it.state = 'done';
      continue;
    }
    it.progress += spd;
    if (it.progress < 0.20) it.state = 'intake';
    else if (it.progress < 0.80) {
      it.state = 'forge';
      if (it.rejected && it.progress >= 0.48 && it.progress < 0.49 + spd) {
        it.state = 'rejected'; it.rejectT = 0; continue;
      }
    } else if (it.progress < 1.0) {
      it.state = 'output';
      it.sparkle = Math.min(1, (it.progress - 0.80) / 0.12);
    } else {
      shippedExtra++; updateShipped(); it.state = 'done';
    }
  }
}

// ═══ SMOKE ═══
const smoke = Array.from({length: 5}, (_, i) => ({ off: i * 800, x:0, y:0, r:0, a:0 }));
function updateSmoke(t) {
  const cx = fx + fw * 0.82, cy = fy - 6;
  for (const s of smoke) {
    const p = ((t + s.off) % 4000) / 4000;
    s.x = cx + Math.sin(p * Math.PI * 2.5) * 10 + Math.sin(p * 5) * 3;
    s.y = cy - p * 70;
    s.r = 5 + p * 18;
    s.a = Math.max(0, 0.25 - p * 0.3);
  }
}

// ═══ PARTICLES ═══
const parts = Array.from({length: 18}, () => ({
  x: Math.random(), y: Math.random(),
  vx: (Math.random() - 0.5) * 0.00004,
  vy: -Math.random() * 0.00008 - 0.00002,
  sz: 1 + Math.random() * 2.5,
  br: 0.2 + Math.random() * 0.5,
  tw: Math.random() * Math.PI * 2,
}));
function updateParts(dt) {
  for (const p of parts) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.tw += dt * 0.003;
    if (p.y < -0.05 || p.x < -0.05 || p.x > 1.05) {
      p.x = 0.05 + Math.random() * 0.9; p.y = 0.95 + Math.random() * 0.05;
    }
  }
}

// ═══ STARS ═══
const stars = Array.from({length: 40}, () => ({
  x: Math.random(), y: Math.random() * 0.3,
  sz: Math.random() < 0.3 ? 2 : 1,
  br: 0.15 + Math.random() * 0.35,
  tw: Math.random() * Math.PI * 2,
  spd: 0.001 + Math.random() * 0.002,
}));

// ═══ DRAW HELPERS ═══
function diamond(cx, cy, s) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - s);
  ctx.lineTo(cx + s * 0.7, cy);
  ctx.lineTo(cx, cy + s * 0.5);
  ctx.lineTo(cx - s * 0.7, cy);
  ctx.closePath();
  ctx.fill();
}

function drawGear(cx, cy, r, teeth, ang, col) {
  ctx.save(); ctx.translate(cx, cy);
  if (!reducedMotion) ctx.rotate(ang);
  ctx.fillStyle = col;
  ctx.beginPath();
  for (let i = 0; i < teeth; i++) {
    const a1 = (i / teeth) * Math.PI * 2;
    const a2 = ((i + 0.3) / teeth) * Math.PI * 2;
    const a3 = ((i + 0.5) / teeth) * Math.PI * 2;
    const a4 = ((i + 0.8) / teeth) * Math.PI * 2;
    const ri = r * 0.65;
    if (i === 0) ctx.moveTo(Math.cos(a1) * r, Math.sin(a1) * r);
    ctx.lineTo(Math.cos(a2) * r, Math.sin(a2) * r);
    ctx.lineTo(Math.cos(a2) * ri, Math.sin(a2) * ri);
    ctx.lineTo(Math.cos(a3) * ri, Math.sin(a3) * ri);
    ctx.lineTo(Math.cos(a4) * r, Math.sin(a4) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#0d0d18';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ═══ DRAW: BACKGROUND ═══
function drawBg(t) {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    const tw = (Math.sin(s.tw + t * s.spd) + 1) / 2;
    ctx.globalAlpha = s.br * (0.5 + tw * 0.5);
    ctx.fillStyle = '#c8c8d8';
    ctx.fillRect(Math.floor(s.x * W), Math.floor(s.y * H), s.sz, s.sz);
  }
  ctx.globalAlpha = 1;

  // Subtle grid
  ctx.fillStyle = '#0e0e14';
  for (let gx = 0; gx < W; gx += 32) {
    for (let gy = 0; gy < H; gy += 32) {
      ctx.fillRect(gx, gy, 1, 1);
    }
  }
}

// ═══ DRAW: FACTORY STRUCTURE ═══
function drawFactory(t) {
  // ── ROOF / TOP SECTION ──
  const roofH = 14;
  const roofY = fy - roofH;

  // Main roof
  ctx.fillStyle = '#1e1e30';
  ctx.fillRect(fx, roofY, fw, roofH);
  ctx.fillStyle = '#252540';
  ctx.fillRect(fx, roofY, fw, 3);

  // Skylights on roof
  for (let i = 0; i < 6; i++) {
    const slx = fx + fw * 0.1 + i * (fw * 0.14);
    const glow = reducedMotion ? 0.3 : 0.2 + Math.sin(t * 0.002 + i) * 0.1;
    ctx.fillStyle = `rgba(255,176,0,${glow})`;
    ctx.fillRect(Math.floor(slx), roofY + 4, 20, 6);
    ctx.strokeStyle = '#3a3a50';
    ctx.lineWidth = 1;
    ctx.strokeRect(Math.floor(slx), roofY + 4, 20, 6);
  }

  // Rivets
  ctx.fillStyle = '#3a3a50';
  for (let rx = fx + 8; rx < fx + fw; rx += 18) {
    ctx.beginPath(); ctx.arc(rx, roofY + 2, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // ── CHIMNEY ──
  const chimX = fx + fw * 0.80;
  const chimW = 22; const chimH = 38;
  ctx.fillStyle = '#22222e';
  ctx.fillRect(chimX, roofY - chimH, chimW, chimH + 2);
  ctx.strokeStyle = '#3a3a50';
  ctx.lineWidth = 1;
  ctx.strokeRect(chimX, roofY - chimH, chimW, chimH + 2);
  // Chimney bands
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(chimX, roofY - chimH + 6, chimW, 3);
  ctx.fillRect(chimX, roofY - chimH + chimH - 8, chimW, 3);

  // ── MAIN BODY ──
  const grad = ctx.createLinearGradient(fx, fy, fx, fy + fh);
  grad.addColorStop(0, '#181828');
  grad.addColorStop(0.5, '#14141f');
  grad.addColorStop(1, '#101018');
  ctx.fillStyle = grad;
  ctx.fillRect(fx, fy, fw, fh);

  // Body border
  ctx.strokeStyle = C.borderB;
  ctx.lineWidth = 2;
  ctx.strokeRect(fx, fy, fw, fh);

  // ── ZONE BACKGROUNDS with GLOW ──
  const zInputW = fw * 0.20;
  const zForgeW = fw * 0.60;
  const zOutputW = fw * 0.20;
  const zY = fy + 2;
  const zH = fh - 4;

  drawZoneGlow(fx + 2, zY, zInputW - 2, zH, C.blue, C.blueGlow);
  drawZoneGlow(fx + zInputW, zY, zForgeW, zH, C.amber, C.amberGlow);
  drawZoneGlow(fx + zInputW + zForgeW, zY, zOutputW - 2, zH, C.gold, C.goldGlow);

  // ── ZONE DIVIDERS ──
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  const d1 = fx + zInputW;
  ctx.beginPath(); ctx.moveTo(d1, zY + 8); ctx.lineTo(d1, zY + zH - 8); ctx.stroke();
  const d2 = fx + zInputW + zForgeW;
  ctx.beginPath(); ctx.moveTo(d2, zY + 8); ctx.lineTo(d2, zY + zH - 8); ctx.stroke();
  ctx.setLineDash([]);

  // ── CONVEYOR BELT ──
  const beltY = fy + fh * 0.65;
  const beltH = 14;
  const beltX = fx + 10;
  const beltW = fw - 20;

  // Belt track with depth
  ctx.fillStyle = '#1a1a28';
  ctx.fillRect(beltX, beltY - 1, beltW, beltH + 2);
  ctx.fillStyle = '#282838';
  ctx.fillRect(beltX, beltY, beltW, beltH);

  // Belt segments
  const segOff = reducedMotion ? 0 : (t % 800) / 800 * 20;
  ctx.fillStyle = '#333345';
  for (let sx = beltX - segOff; sx < beltX + beltW; sx += 20) {
    const dx = Math.max(sx, beltX);
    const dw = Math.min(sx + 2, beltX + beltW) - dx;
    if (dw > 0) ctx.fillRect(dx, beltY + 2, dw, beltH - 4);
  }

  // Belt edge highlights
  ctx.fillStyle = '#404058';
  ctx.fillRect(beltX, beltY, beltW, 1);
  ctx.fillStyle = '#1a1a20';
  ctx.fillRect(beltX, beltY + beltH - 1, beltW, 1);

  // Belt rollers
  ctx.fillStyle = '#3a3a4a';
  for (let rx = beltX + 30; rx < beltX + beltW - 30; rx += 60) {
    ctx.beginPath(); ctx.arc(rx, beltY + beltH + 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2a2a35';
    ctx.beginPath(); ctx.arc(rx, beltY + beltH + 4, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a3a4a';
  }

  // Belt supports
  ctx.fillStyle = '#1e1e2a';
  for (let sx = beltX + 50; sx < beltX + beltW - 50; sx += 120) {
    ctx.fillRect(sx, beltY + beltH, 3, 14);
    ctx.fillRect(sx - 4, beltY + beltH + 14, 11, 3);
  }

  // ── FLOOR PIPES & CABLES ──
  drawFloorDetail(fx, fy, fw, fh, beltY, t);

  // ── FORGE MACHINERY ──
  drawForgeMachinery(fx + zInputW, fy, zForgeW, fh, t, beltY);

  // ── INTAKE HOPPER ──
  drawIntakeHopper(fx, fy, zInputW, t, beltY);

  // ── OUTPUT DOCK ──
  drawOutputDock(fx + zInputW + zForgeW, fy, zOutputW, t, beltY);

  // ── WALL PANELS & GAUGES (above conveyor) ──
  drawWallDetail(fx, fy, fw, fh, zInputW, zForgeW, t);

  // ── ITEMS ──
  for (const it of items) {
    if (it.state === 'done') continue;
    const ix = beltX + it.progress * beltW;
    const iy = beltY - 6 + it.yOff;
    drawItem(ix, iy, it, t);
  }

  // ── CHARACTERS ──
  drawNV(fx + zInputW * 0.45, beltY - 36, t);
  drawGarry(fx + zInputW + zForgeW + zOutputW * 0.55, beltY - 36, t);

  // ── ZONE LABELS ──
  ctx.font = '16px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = C.blue;
  ctx.fillText('> ideas --in', fx + zInputW * 0.5, fy + fh - 8);
  ctx.fillStyle = C.amber;
  ctx.fillText('// gstack pipeline', fx + zInputW + zForgeW * 0.5, fy + fh - 8);
  ctx.fillStyle = C.gold;
  ctx.fillText('> shipped \u2713', fx + zInputW + zForgeW + zOutputW * 0.5, fy + fh - 8);

  // Processing counter
  const active = items.filter(i => i.state === 'forge').length;
  if (active > 0) {
    ctx.fillStyle = C.amberHot;
    ctx.font = '13px "VT323", monospace';
    ctx.fillText('[processing: ' + active + ']', fx + zInputW + zForgeW * 0.5, fy + 16);
  }

  // ── SMOKE ──
  for (const s of smoke) {
    if (s.a <= 0) continue;
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#555566';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    // Inner lighter core
    ctx.fillStyle = '#666677';
    ctx.beginPath(); ctx.arc(s.x + 1, s.y - 1, s.r * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── FLOOR LINE ──
  ctx.fillStyle = '#1a1a28';
  ctx.fillRect(fx - 10, fy + fh + 2, fw + 20, 4);
  ctx.fillStyle = '#0d0d15';
  ctx.fillRect(fx - 10, fy + fh + 6, fw + 20, 8);
}

function drawZoneGlow(x, y, w, h, col, glowCol) {
  // Radial glow from bottom center
  const grad = ctx.createRadialGradient(x + w/2, y + h * 0.7, 0, x + w/2, y + h * 0.7, Math.max(w, h) * 0.8);
  grad.addColorStop(0, glowCol);
  grad.addColorStop(0.6, glowCol);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // Bottom edge highlight
  ctx.fillStyle = hexA(col, '18');
  ctx.fillRect(x + 4, y + h - 4, w - 8, 4);
}

function drawFloorDetail(fx, fy, fw, fh, beltY, t) {
  const floorY = beltY + 24;
  const floorBot = fy + fh - 18;

  // Horizontal pipes below conveyor
  ctx.strokeStyle = '#222235';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(fx + 20, floorY + 10);
  ctx.lineTo(fx + fw - 20, floorY + 10);
  ctx.stroke();

  ctx.strokeStyle = '#1e1e30';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(fx + 40, floorY + 22);
  ctx.lineTo(fx + fw - 40, floorY + 22);
  ctx.stroke();

  // Pipe joints / valves
  ctx.fillStyle = '#2a2a3e';
  for (let px = fx + 80; px < fx + fw - 80; px += 100) {
    ctx.beginPath(); ctx.arc(px, floorY + 10, 4, 0, Math.PI * 2); ctx.fill();
  }

  // Vertical pipe connectors
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 2;
  for (let px = fx + 120; px < fx + fw - 120; px += 180) {
    ctx.beginPath();
    ctx.moveTo(px, floorY + 10);
    ctx.lineTo(px, floorY + 22);
    ctx.stroke();
  }

  // Cable bundles on floor
  ctx.strokeStyle = '#18182a';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const cy = floorBot - 4 - i * 3;
    ctx.beginPath();
    ctx.moveTo(fx + 30 + i * 10, cy);
    for (let cx = fx + 30; cx < fx + fw - 30; cx += 20) {
      ctx.lineTo(cx + 10, cy + Math.sin(cx * 0.02 + i) * 1.5);
    }
    ctx.stroke();
  }

  // Floor grate pattern (subtle)
  ctx.fillStyle = '#0f0f18';
  for (let gx = fx + 15; gx < fx + fw - 15; gx += 8) {
    for (let gy = floorBot - 2; gy < fy + fh - 8; gy += 4) {
      ctx.fillRect(gx, gy, 2, 1);
    }
  }
}

function drawWallDetail(fx, fy, fw, fh, inputW, forgeW, t) {
  // Gauge panels on back wall (in forge zone)
  const forgeX = fx + inputW;
  const panelY = fy + 10;

  // Small monitoring screens
  for (let i = 0; i < 4; i++) {
    const px = forgeX + forgeW * (0.08 + i * 0.24);
    const py = panelY + 28;

    // Screen housing
    ctx.fillStyle = '#1a1a28';
    ctx.fillRect(px, py, 22, 16);
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, 22, 16);

    // Screen content — mini waveforms
    ctx.fillStyle = i < 2 ? hexA(C.greenDim, '80') : hexA(C.amberDim, '80');
    const waveY = py + 8;
    for (let wx = 0; wx < 18; wx += 2) {
      const h = reducedMotion ? 3 : 2 + Math.sin(t * 0.004 + wx * 0.5 + i * 2) * 3;
      ctx.fillRect(px + 2 + wx, waveY - h / 2, 1, Math.max(1, h));
    }

    // LED dot
    const ledOn = reducedMotion ? true : Math.sin(t * 0.002 + i) > -0.3;
    ctx.fillStyle = ledOn ? '#4AF626' : '#1a3a10';
    ctx.fillRect(px + 18, py + 2, 2, 2);
  }

  // Input zone: terminal screen
  const termX = fx + inputW * 0.2;
  const termY = fy + 14;
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(termX, termY, 36, 24);
  ctx.strokeStyle = C.blueDim;
  ctx.lineWidth = 1;
  ctx.strokeRect(termX, termY, 36, 24);
  // Terminal text lines
  ctx.fillStyle = hexA(C.blue, '60');
  for (let l = 0; l < 4; l++) {
    const lw = 8 + Math.random() * 20;
    ctx.fillRect(termX + 3, termY + 4 + l * 5, Math.min(lw, 30), 2);
  }

  // Output zone: quality badge
  const badgeX = fx + inputW + forgeW + (fw - inputW - forgeW) * 0.3;
  const badgeY = fy + 18;
  ctx.fillStyle = hexA(C.gold, '20');
  ctx.beginPath(); ctx.arc(badgeX + 12, badgeY + 12, 14, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = hexA(C.gold, '40');
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(badgeX + 12, badgeY + 12, 14, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = hexA(C.gold, '60');
  ctx.font = '9px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('QA', badgeX + 12, badgeY + 14);
  ctx.fillText('PASS', badgeX + 12, badgeY + 22);
}

function drawForgeMachinery(zx, zy, zw, zh, t, beltY) {
  const cx = zx + zw * 0.5;
  const machY = zy + zh * 0.20;

  // Gears — multiple interlocking
  drawGear(zx + zw * 0.15, machY, 18, 7, t * 0.0008, '#3a3520');
  drawGear(zx + zw * 0.15 + 28, machY + 6, 12, 5, -t * 0.0012, '#3a3520');
  drawGear(zx + zw * 0.38, machY - 4, 22, 8, t * 0.0006, '#2e2a18');
  drawGear(zx + zw * 0.38 + 32, machY + 2, 14, 6, -t * 0.001, '#3a3520');
  drawGear(zx + zw * 0.62, machY - 2, 16, 6, t * 0.001, '#3a3520');
  drawGear(zx + zw * 0.78, machY + 4, 20, 7, -t * 0.0007, '#2e2a18');

  // Stamp press (center)
  const stampY = zy + zh * 0.14;
  ctx.fillStyle = '#3a3a4e';
  ctx.fillRect(cx - 14, stampY, 28, 8);
  // Piston
  const pistonExt = reducedMotion ? 0 : Math.abs(Math.sin(t * 0.003)) * 8;
  ctx.fillStyle = '#4a4a60';
  ctx.fillRect(cx - 6, stampY + 8, 12, 6 + pistonExt);
  ctx.fillStyle = hexA(C.amber, '40');
  ctx.fillRect(cx - 4, stampY + 14 + pistonExt, 8, 2);

  // Processing progress bars (3 stations)
  for (let i = 0; i < 3; i++) {
    const bx = zx + zw * (0.12 + i * 0.30);
    const by = zy + zh * 0.82;
    const progress = reducedMotion ? 0.5 : (Math.sin(t * 0.002 + i * 1.8) + 1) / 2;
    ctx.fillStyle = '#14141e';
    ctx.fillRect(bx, by, 50, 5);
    ctx.fillStyle = C.amber;
    ctx.fillRect(bx, by, 50 * progress, 5);
    ctx.strokeStyle = '#2a2a35';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, 50, 5);
    // Station label
    ctx.fillStyle = C.amberDim;
    ctx.font = '10px "VT323", monospace';
    ctx.textAlign = 'center';
    const labels = ['/office-hours', '/ceo-review', '/eng-review'];
    ctx.fillText(labels[i], bx + 25, by - 4);
  }

  // Sparks
  if (!reducedMotion && Math.sin(t * 0.005) > 0.7) {
    for (let i = 0; i < 5; i++) {
      const a = (t * 0.012 + i * 1.3) % (Math.PI * 2);
      const d = 20 + Math.sin(t * 0.02 + i * 0.7) * 10;
      const sx = cx + Math.cos(a) * d;
      const sy = machY + Math.sin(a) * d * 0.4;
      ctx.fillStyle = i % 2 === 0 ? C.amberHot : '#ffe8a0';
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
    }
  }

  // Pipes connecting stations
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(zx + 10, machY + 20);
  ctx.lineTo(zx + zw - 10, machY + 20);
  ctx.stroke();
  // Pipe joints
  ctx.fillStyle = '#3a3a4a';
  for (let px = zx + 40; px < zx + zw - 40; px += 80) {
    ctx.beginPath(); ctx.arc(px, machY + 20, 3, 0, Math.PI * 2); ctx.fill();
  }

  // ── MID-SECTION DETAIL: vertical conduits, transformers ──
  const midY = machY + 30;
  const midBot = beltY - 20;
  const midH = midBot - midY;

  if (midH > 20) {
    // Vertical conduits (3 major lines)
    for (let i = 0; i < 3; i++) {
      const cx2 = zx + zw * (0.20 + i * 0.30);
      // Main conduit
      ctx.fillStyle = '#1e1e30';
      ctx.fillRect(cx2 - 2, midY, 4, midH);
      // Highlight edge
      ctx.fillStyle = '#2a2a40';
      ctx.fillRect(cx2 - 2, midY, 1, midH);
      // Junction boxes
      ctx.fillStyle = '#252538';
      ctx.fillRect(cx2 - 5, midY + midH * 0.3, 10, 8);
      ctx.strokeStyle = '#3a3a4a';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx2 - 5, midY + midH * 0.3, 10, 8);
      // LED on junction
      const ledPhase = reducedMotion ? 1 : (Math.sin(t * 0.003 + i * 2) > 0 ? 1 : 0.2);
      ctx.fillStyle = `rgba(74,246,38,${ledPhase * 0.6})`;
      ctx.fillRect(cx2 - 1, midY + midH * 0.3 + 3, 2, 2);
    }

    // Horizontal cable runs between conduits
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1;
    for (let j = 0; j < 2; j++) {
      const cy2 = midY + midH * (0.2 + j * 0.45);
      ctx.beginPath();
      ctx.moveTo(zx + zw * 0.18, cy2);
      ctx.lineTo(zx + zw * 0.82, cy2);
      ctx.stroke();
    }

    // Small transformers / boxes (between conduits)
    for (let i = 0; i < 2; i++) {
      const bx = zx + zw * (0.35 + i * 0.30);
      const by2 = midY + midH * 0.55;
      ctx.fillStyle = '#1a1a28';
      ctx.fillRect(bx, by2, 14, 10);
      ctx.strokeStyle = '#2a2a38';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by2, 14, 10);
      // Coil lines
      ctx.fillStyle = hexA(C.amberDim, '40');
      ctx.fillRect(bx + 3, by2 + 2, 8, 1);
      ctx.fillRect(bx + 3, by2 + 5, 8, 1);
      ctx.fillRect(bx + 3, by2 + 8, 8, 1);
    }
  }
}

function drawIntakeHopper(zx, zy, zw, t, beltY) {
  const hx = zx + zw * 0.4;
  const hy = zy + 8;
  const hw = 30;

  // Funnel
  ctx.fillStyle = '#1e2a40';
  ctx.beginPath();
  ctx.moveTo(hx - 4, hy);
  ctx.lineTo(hx + hw + 4, hy);
  ctx.lineTo(hx + hw - 6, hy + 28);
  ctx.lineTo(hx + 6, hy + 28);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = C.blueDim;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Funnel inner glow
  ctx.fillStyle = C.blueGlow;
  ctx.fillRect(hx + 8, hy + 8, hw - 16, 16);

  // Falling idea orbs
  if (!reducedMotion) {
    const cycle = (t % ITEM_SPAWN_MS) / ITEM_SPAWN_MS;
    if (cycle < 0.35) {
      const fallY = hy - 18 + cycle * 100;
      const alpha = cycle < 0.1 ? cycle / 0.1 : 1;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = C.blue;
      diamond(hx + hw / 2, fallY, 6);
      // Trail
      ctx.fillStyle = hexA(C.blue, '30');
      diamond(hx + hw / 2, fallY - 8, 4);
      ctx.globalAlpha = 1;
    }
  }

  // Chute to belt
  ctx.fillStyle = '#1a2535';
  ctx.fillRect(hx + 10, hy + 28, 10, beltY - hy - 28);
}

function drawOutputDock(zx, zy, zw, t, beltY) {
  const dx = zx + zw * 0.5;
  const dy = beltY - 20;

  // Exit arrows
  for (let i = 0; i < 3; i++) {
    const alpha = reducedMotion ? 0.15 : 0.1 + Math.sin(t * 0.003 + i * 0.5) * 0.1;
    ctx.fillStyle = C.gold;
    ctx.globalAlpha = alpha;
    const ax = zx + zw - 16 - i * 12;
    ctx.beginPath();
    ctx.moveTo(ax, dy); ctx.lineTo(ax + 10, dy + 8); ctx.lineTo(ax, dy + 16);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Floating shipped products
  if (!reducedMotion) {
    for (let i = 0; i < 3; i++) {
      const p = ((t * 0.0006 + i * 0.33) % 1);
      const px = zx + zw * 0.6 + p * zw * 0.3;
      const py = zy + fh * 0.3 - p * 50;
      const a = (1 - p) * 0.5;
      if (a > 0.03) {
        ctx.globalAlpha = a;
        ctx.fillStyle = C.gold;
        ctx.fillRect(Math.floor(px - 4), Math.floor(py - 4), 8, 8);
        // Sparkle
        ctx.fillStyle = '#fff';
        ctx.fillRect(Math.floor(px - 1), Math.floor(py - 7), 2, 2);
        ctx.fillRect(Math.floor(px + 5), Math.floor(py), 2, 2);
        ctx.globalAlpha = 1;
      }
    }
  }

  // Shipping label
  ctx.fillStyle = hexA(C.gold, '30');
  ctx.font = '11px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHIPPED', zx + zw * 0.5, zy + 16);
}

function drawItem(x, y, it, t) {
  const s = it.size;
  ctx.globalAlpha = it.opacity;

  if (it.state === 'intake') {
    ctx.fillStyle = C.blue;
    diamond(x, y, s);
    ctx.fillStyle = hexA(C.blue, '30');
    diamond(x, y, s + 4);
  } else if (it.state === 'forge') {
    ctx.fillStyle = C.amber;
    diamond(x, y, s);
    const pulse = reducedMotion ? 0 : Math.sin(t * 0.008) * 0.3;
    ctx.fillStyle = hexA(C.amberHot, '40');
    diamond(x, y, s + 3 + pulse * 3);
  } else if (it.state === 'output') {
    ctx.fillStyle = C.gold;
    const hs = Math.floor(s / 2);
    ctx.fillRect(Math.floor(x - hs), Math.floor(y - hs), s | 0, s | 0);
    // Golden glow
    ctx.fillStyle = hexA(C.gold, '20');
    ctx.fillRect(Math.floor(x - hs - 2), Math.floor(y - hs - 2), (s | 0) + 4, (s | 0) + 4);
    if (it.sparkle > 0 && !reducedMotion) {
      ctx.fillStyle = '#fff';
      const sp = 0.5 + Math.sin(t * 0.015) * 0.5;
      ctx.globalAlpha = it.sparkle * sp;
      ctx.fillRect(x - 1 | 0, (y - s - 3) | 0, 2, 2);
      ctx.fillRect((x + hs + 2) | 0, (y - 1) | 0, 2, 2);
      ctx.fillRect((x - hs - 3) | 0, (y + 1) | 0, 2, 2);
      ctx.fillRect((x + 1) | 0, (y + hs + 2) | 0, 2, 2);
    }
  } else if (it.state === 'rejected') {
    ctx.fillStyle = C.red;
    diamond(x, y, it.size);
    for (let i = 0; i < 5; i++) {
      const a = it.rejectT * 0.01 + i * 1.26;
      const d = it.rejectT * 0.08;
      ctx.fillStyle = C.redDim;
      ctx.fillRect(x + Math.cos(a) * d | 0, y + Math.sin(a) * d - it.rejectT * 0.04 | 0, 2, 2);
    }
  }
  ctx.globalAlpha = 1;
}

// ═══ CHARACTER: NV ═══
function drawNV(x, y, t) {

  const by = Math.floor(y + bounce);

  // Legs
  ctx.fillStyle = '#2a3a5a';
  ctx.fillRect(bx + 6, by + 26, 7, 8);
  ctx.fillRect(bx + 17, by + 26, 7, 8);
  // Shoes
  ctx.fillStyle = '#404050';
  ctx.fillRect(bx + 4, by + 33, 9, 4);
  ctx.fillRect(bx + 16, by + 33, 9, 4);

  // Body (blue jacket)
  ctx.fillStyle = '#3a6aaa';
  ctx.fillRect(bx + 4, by + 12, 22, 15);
  // Jacket detail
  ctx.fillStyle = '#3060a0';
  ctx.fillRect(bx + 14, by + 12, 2, 15);

  // Head
  ctx.fillStyle = '#d4b896';
  ctx.fillRect(bx + 7, by, 16, 12);
  // Hair
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(bx + 6, by - 2, 18, 5);

  ctx.fillStyle = C.blue;
  ctx.font = '12px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NV', x, by - 6);
}

// ═══ CHARACTER: GARRY ═══

  ctx.fillStyle = '#5a5a6a';

  ctx.textAlign = 'center';
  ctx.fillText('GARRY', x, by - 8);
}

// ═══ PARTICLES ═══
function drawParticles(t) {
  if (reducedMotion) return;
  for (const p of parts) {
    const tw = (Math.sin(p.tw) + 1) / 2;
    const a = p.br * tw;
    if (a < 0.04) continue;
    ctx.globalAlpha = a;
    const px = fx + p.x * fw;
    const py = fy + p.y * fh;
    ctx.fillStyle = p.x < 0.2 ? C.blue : p.x < 0.8 ? '#ffe8a0' : C.gold;
    ctx.fillRect(px | 0, py | 0, Math.ceil(p.sz), Math.ceil(p.sz));
  }
  ctx.globalAlpha = 1;
}

// ═══ MAIN LOOP ═══
let lastT = 0;

function render(ts) {
  if (!ts) ts = 0;
  const dt = lastT ? Math.min(ts - lastT, 100) : 16;
  lastT = ts;

  if (document.hidden) return;

  if (!reducedMotion) {
    updateItems(ts, dt);
    updateSmoke(ts);
    updateParts(dt);
  }

  drawBg(ts);
  drawFactory(ts);
  drawParticles(ts);

  // OG export
  if (window.location.search.includes('export=og')) {
    if (!render._fc) render._fc = 0;
    render._fc++;
    if (render._fc === 60) {
      try {
        canvas.toBlob(function(b) {
          if (!b) return;
          const url = URL.createObjectURL(b);
          const a = document.createElement('a');
          a.href = url; a.download = 'og-factory.png'; a.click();
          setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        }, 'image/png');
      } catch(e) {
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png'); a.download = 'og-factory.png'; a.click();
      }
    }
  }

  requestAnimationFrame(render);
}

// Seed initial items
const now = performance.now();
for (let i = 0; i < 6; i++) {
  const it = {
    id: itemId++, progress: 0.05 + i * 0.16, state: 'intake',
    rejected: i === 3, rejectT: 0, sparkle: 0, spawnT: now - i * 2500,
    opacity: 1, size: 7 + Math.random() * 3, yOff: (Math.random() - 0.5) * 2,
  };
  if (it.progress >= 0.2 && it.progress < 0.8) it.state = 'forge';
  if (it.progress >= 0.8) { it.state = 'output'; it.sparkle = 0.5; }
  items.push(it);
}
lastSpawn = now;

// Resume animation when tab becomes visible again
document.addEventListener('visibilitychange', function() {
  if (!document.hidden) { lastT = 0; requestAnimationFrame(render); }
});

requestAnimationFrame(render);
})();
</script>
</body>
</html>
